# ============================================
# VilchesApp — Docker Compose
# Run: docker compose up
# ============================================

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vilchesapp
      POSTGRES_USER: vilchesapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vilchesapp_secret_change_me}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vilchesapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://vilchesapp:${DB_PASSWORD:-vilchesapp_secret_change_me}@db:5432/vilchesapp
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-random-secret}
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      COMPANY_NAME: ${COMPANY_NAME:-My Company}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  db_data:
  uploads_data:
